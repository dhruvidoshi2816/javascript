<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: #212121; color: white;"">
    <ul class="langugae">
        <li>JavaScript</li>
        <!-- <li>Python</li> -->
        <li>Java</li>
        <li>C++</li>
    </ul>
</body>
<script>
    function addLanguage (langName) {
        const li = document.createElement("li"); 
        li.innerHTML = `${langName}`;
        document.querySelector(".langugae").appendChild(li); 
        }
    addLanguage("python");
    addLanguage("typescript");

    function addOptimisedLanguage(langName) {
        const li = document.createElement("li"); 
        li.appendChild(document.createTextNode(langName));
        document.querySelector(".langugae").appendChild(li); 
        }
        addOptimisedLanguage("Go");


        // Edit
        const secondLanguage = document.querySelector("li:nth-child(2)");
        // secondLanguage.innerHTML = "MOJO";

        const newli = document.createElement('li')
        newli.textContent = "MOJO";
        secondLanguage.replaceWith(newli); 

        // Edit
        const firstLanguage = document.querySelector("li:first-child");
        firstLanguage.outerHTML = "<li>TypeScript</li>";

        // remove
        const lastLanguage = document.querySelector("li:last-child");
        lastLanguage.remove();


</script>
</html>
